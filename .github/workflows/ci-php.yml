name: CI · PHP (reusable capability)

# Reusable PHP CI capability — the first capability carved out toward LittlePipes v2
# (LP-51), and the SINGLE source of truth for PHP CI. Callable via `workflow_call` from:
#   - littlepipes-dispatch.yaml  (v1 entry, when a dispatch normalizes to intent:ci)
#   - php-ci-on-dispatch.yaml     (legacy `php-ci` event — thin caller during migration)
# Both converge here, so there's one copy of the CI steps. Body is a faithful move of the
# SnappShot pilot job that lived inline in php-ci-on-dispatch.yaml.
#
# SECURITY: inputs carry payload-derived (untrusted) values, so they are mapped into `env:`
# and referenced as "$VARS" in shell — NEVER interpolated as `${{ inputs.* }}` inside a
# run/curl body (that's the LP-55 injection class). `${{ inputs.* }}` is only used where it
# feeds an action input (e.g. checkout `repository:`/`ref:`), which is not a shell context.
#
# PILOT SCOPE: the CI steps still mirror SnappShot's suite. Phase 2 makes them config-driven
# from the normalized `ci` block (test_command, gates[]). Notes: .claude/notes/dispatch-contract-v1.md.

on:
  workflow_call:
    inputs:
      target_repo:
        description: 'owner/repo of the private source to check out'
        required: true
        type: string
      sha:
        description: 'commit SHA to check out and report status on'
        required: true
        type: string
      ref:
        description: 'git ref/branch (for logging/report context)'
        required: false
        type: string
        default: 'main'
      status_context:
        description: 'commit-status context to report under'
        required: false
        type: string
        default: 'littlepipes/ci'
    secrets:
      TARGET_REPO_TOKEN:
        description: 'fine-grained token: contents:read + commit-statuses:write on the tenant repo'
        required: true

jobs:
  php-ci:
    runs-on: ubuntu-latest
    name: PHP CI (SnappShot pilot)

    env:
      # Untrusted payload-derived values → env (referenced as "$VAR" in shell, never
      # interpolated into a run body). See the SECURITY note above.
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_SHA: ${{ inputs.sha }}
      TARGET_REF: ${{ inputs.ref }}
      STATUS_CONTEXT: ${{ inputs.status_context }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      # SnappShot app/test env (pilot-specific; Phase 2 moves these into the payload ci block).
      SS_ENV: test
      DB_TEST_HOST: 127.0.0.1
      DB_TEST_NAME: snappshot_test
      DB_TEST_USER: root
      DB_TEST_PASS: root
      PHP_CLI_SERVER_WORKERS: 4
      E2E_BASE_URL: http://127.0.0.1:8000

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: snappshot_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail
          if [ -z "$TARGET_REPO" ] || [ -z "$TARGET_SHA" ]; then
            echo "::error::target_repo and sha are required"; exit 1
          fi
          echo "Running PHP CI for $TARGET_REPO @ $TARGET_SHA (ref: ${TARGET_REF:-n/a})"

      - name: Report pending status to tenant
        env:
          STATUS_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
        run: |
          # No `set -e` here on purpose: a transient transport failure on this POST must
          # NOT abort the job (there's no `if: always()` guard) — it degrades to a loud
          # `::error::` and the run proceeds. curl -sS lacks --fail, so HTTP errors still
          # yield a code to check below. (Preserves commit 304c0b6's loud-but-non-fatal intent.)
          if [ -z "$STATUS_TOKEN" ]; then echo "No status token; skipping status-back."; exit 0; fi
          code=$(curl -sS -X POST \
            -H "Authorization: token $STATUS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$TARGET_REPO/statuses/$TARGET_SHA" \
            -d "$(jq -nc --arg ctx "$STATUS_CONTEXT" --arg url "$RUN_URL" \
                  '{state:"pending",context:$ctx,description:"Running on LittlePipes public runner",target_url:$url}')" \
            -o /dev/null -w "%{http_code}")
          echo "pending status: HTTP $code"
          # POST /statuses returns 201 on success. Surface anything else loudly
          # (403 = token missing 'Commit statuses: write' on the target repo).
          if [ "$code" != "201" ]; then
            echo "::error::status-back rejected (HTTP $code) — does the target token have 'Commit statuses: write' on $TARGET_REPO?"
          fi

      - name: Checkout tenant source
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.sha }}
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, mbstring, json
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      # ---- Static gates (no DB; fail fast). SnappShot-specific for the pilot. ----
      - name: Code style (PHP-CS-Fixer)
        run: composer lint

      - name: Template separation (JS/CSS out of templates)
        run: php scripts/lint/template_separation.php

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      # ---- DB-backed suite ----
      - name: Wait for MariaDB
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then echo "MariaDB up"; break; fi
            echo "waiting for mariadb ($i)"; sleep 2
          done

      - name: Relax CHECK constraints for legacy-migration replay
        run: mysql -h 127.0.0.1 -uroot -proot -e "SET GLOBAL check_constraint_checks=OFF;"

      - name: Run migrations (builds full schema on snappshot_test)
        run: php scripts/migrations/run_migrations.php

      - name: Seed fixture matrix
        run: php scripts/seed/seed_test_fixtures.php --force

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=never

      # ---- E2E: boot the app in-runner, Playwright smoke + visual gate ----
      - name: Boot the app (php -S, in-CI ephemeral)
        run: |
          php -S 127.0.0.1:8000 -t "$GITHUB_WORKSPACE" > "$GITHUB_WORKSPACE/php-server.log" 2>&1 &
          echo "PHP_SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/admin/" || true)
            if [ "$code" != "000" ]; then echo "app responding (HTTP $code)"; break; fi
            echo "waiting for app ($i)"; sleep 1
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install E2E dependencies
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E smoke against the in-CI app
        working-directory: e2e
        run: npx playwright test --project=chromium --grep "@smoke"

      - name: Run visual regression (gated until baselines exist)
        working-directory: e2e
        env:
          E2E_VISUAL: '1'
        run: |
          if compgen -G "tests/visual*/**/*.png" > /dev/null || compgen -G "tests/visual*/*-snapshots/*.png" > /dev/null; then
            npx playwright test --project=visual --project=visual-authed
          else
            echo "No visual baselines committed yet — skipping the visual gate."
          fi

      - name: Dump app log on failure
        if: failure()
        run: cat "$GITHUB_WORKSPACE/php-server.log" || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7

      # ---- Report the final verdict back to the tenant's PR commit ----
      - name: Report final status to tenant
        if: always()
        env:
          STATUS_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # No `set -e` here on purpose (same reason as the pending step): a transport blip
          # on the final report must not flip an otherwise-green run to failed.
          if [ -z "$STATUS_TOKEN" ]; then echo "No status token; skipping status-back."; exit 0; fi
          STATE="success"; DESC="All checks passed on LittlePipes"
          if [ "$JOB_STATUS" != "success" ]; then STATE="failure"; DESC="CI failed on LittlePipes ($JOB_STATUS)"; fi
          code=$(curl -sS -X POST \
            -H "Authorization: token $STATUS_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$TARGET_REPO/statuses/$TARGET_SHA" \
            -d "$(jq -nc --arg st "$STATE" --arg ctx "$STATUS_CONTEXT" --arg desc "$DESC" --arg url "$RUN_URL" \
                  '{state:$st,context:$ctx,description:$desc,target_url:$url}')" \
            -o /dev/null -w "%{http_code}")
          echo "final status ($STATE): HTTP $code"
          if [ "$code" != "201" ]; then
            echo "::error::status-back rejected (HTTP $code) — does the target token have 'Commit statuses: write' on $TARGET_REPO?"
          fi
