name: PHP CI (dispatch executor)

# Legacy `php-ci` event entrypoint — now a THIN CALLER of the reusable ci-php.yml (LP-51).
# The CI steps used to live inline here; they were carved out into ci-php.yml as the single
# source of truth. This file maps the `php-ci` dispatch payload (and manual inputs) to the
# reusable's inputs, and passes the tenant token through as a masked secret.
#
# MIGRATION: this keeps the live `php-ci` path working AND immediately exercises ci-php.yml
# via SnappShot's real dispatches. The new v1 entry (littlepipes-dispatch.yaml) calls the
# SAME reusable for intent:ci. Once the `littlepipes` path is proven green-for-green, move
# the `php-ci` event onto the entry and delete this file.
#
# NOTE on secrets: SnappShot's php-ci payload carries only TARGET_REPO_TOKEN, which is passed
# straight to the reusable and auto-masked there. If a tenant ever adds more payload secrets,
# they must be passed + masked explicitly (payload values are not auto-masked).
#
# Manual test without the private trigger:
#   Actions ▸ "PHP CI (dispatch executor)" ▸ Run workflow, supply target_repo/sha.
#   (Needs a clone/status token; without one the reusable skips status-back and the private
#   checkout fails — real runs carry the token in the dispatch payload.)

on:
  repository_dispatch:
    types: [php-ci]
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'owner/repo of the private source to check out (e.g. Kobumura/snappshot)'
        required: true
      ref:
        description: 'git ref/branch to report against'
        required: false
        default: 'main'
      sha:
        description: 'commit SHA to check out and report status on'
        required: true

permissions:
  contents: read

concurrency:
  # One in-flight run per (repo, sha); a newer push to the same PR head supersedes.
  group: php-ci-${{ github.event.client_payload.target_repo || github.event.inputs.target_repo }}-${{ github.event.client_payload.sha || github.event.inputs.sha }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci-php.yml
    with:
      target_repo: ${{ github.event.client_payload.target_repo || github.event.inputs.target_repo }}
      sha: ${{ github.event.client_payload.sha || github.event.inputs.sha }}
      ref: ${{ github.event.client_payload.ref || github.event.inputs.ref || 'main' }}
      status_context: ${{ github.event.client_payload.status_context || 'littlepipes/ci' }}
    secrets:
      TARGET_REPO_TOKEN: ${{ github.event.client_payload.secrets.TARGET_REPO_TOKEN || secrets.TARGET_REPO_TOKEN }}
